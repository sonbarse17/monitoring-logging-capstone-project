apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: observability
data:
  filebeat.yml: |
    filebeat.inputs:
    - type: log
      paths:
        - /app/logs/*.log
      json.keys_under_root: true
      json.add_error_key: true
      json.message_key: message
    output.logstash:
      hosts: ["logstash:5044"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observation-node-app
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observation-node-app
  template:
    metadata:
      labels:
        app: observation-node-app
    spec:
      volumes:
      - name: shared-logs
        emptyDir: {}
      - name: filebeat-config-volume
        configMap:
          name: filebeat-config
      containers:
      # Our sample node.js application that generates the ELK JSON logs
      - name: application
        # Uses standard docker hub convention or minikube local image depending on your test environment
        image: sonbarse17/node-observability:latest
        imagePullPolicy: Always 
        env:
        - name: LOG_LEVEL
          value: "debug"
        # OTEL required for generating the injected trace_ids via jaeger if running
        - name: OTEL_SERVICE_NAME
          value: "node-k8s-pod"
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: shared-logs
          mountPath: /app/logs
      
      # The Filebeat Agent running side-by-side inside the exact same pod.
      # It shares the emptyDir volume to view the raw .log files natively.
      - name: filebeat-sidecar
        image: docker.elastic.co/beats/filebeat:7.17.15
        user: root # Ensuring it can seamlessly read cross-container file bounds in k8s
        args: [
          "-c", "/etc/filebeat.yml",
          "-e",
        ]
        volumeMounts:
        - name: filebeat-config-volume
          mountPath: /etc/filebeat.yml
          subPath: filebeat.yml
        - name: shared-logs
          mountPath: /app/logs
---
apiVersion: v1
kind: Service
metadata:
  name: observation-node-app
  namespace: observability
spec:
  type: NodePort
  selector:
    app: observation-node-app
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30000
