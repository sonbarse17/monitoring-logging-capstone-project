apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: observability
data:
  filebeat.yml: |
    filebeat.inputs:
    - type: log
      paths:
        - /app/logs/*.log
      json.keys_under_root: true
      json.add_error_key: true
      json.message_key: message
    output.logstash:
      hosts: ["logstash:5044"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observation-proxy-config
  namespace: observability
data:
  nginx.conf: |
    events {}
    http {
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      upstream node_app {
        server 127.0.0.1:3000;
      }

      upstream kibana_app {
        server kibana:5601;
      }

      server {
        listen 8080;
        server_name _;
        absolute_redirect off;
        port_in_redirect off;

        location = /nginx-health {
          return 200 'ok';
          add_header Content-Type text/plain;
        }

        location = /monitoring {
          return 302 /monitoring/app/home;
        }

        location = /monitoring/ {
          return 302 /monitoring/app/home;
        }

        location /monitoring {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_pass http://kibana_app;
        }

        location / {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_pass http://node_app;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observation-node-app
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observation-node-app
  template:
    metadata:
      labels:
        app: observation-node-app
    spec:
      tolerations:
      - key: karpenter.sh/disrupted
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: shared-logs
        emptyDir: {}
      - name: filebeat-config-volume
        configMap:
          name: filebeat-config
      - name: proxy-config-volume
        configMap:
          name: observation-proxy-config
      containers:
      # Our sample node.js application that generates the ELK JSON logs
      - name: application
        # Uses standard docker hub convention or minikube local image depending on your test environment
        image: sonbarse17/node-observability:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: LOG_LEVEL
          value: "debug"
        # OTEL required for generating the injected trace_ids via jaeger if running
        - name: OTEL_SERVICE_NAME
          value: "node-k8s-pod"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger:4318/v1/traces"
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
        volumeMounts:
        - name: shared-logs
          mountPath: /app/logs
      
      # The Filebeat Agent running side-by-side inside the exact same pod.
      # It shares the emptyDir volume to view the raw .log files natively.
      - name: filebeat-sidecar
        image: docker.elastic.co/beats/filebeat:7.17.15
        securityContext:
          runAsUser: 0 # Ensuring it can seamlessly read cross-container file bounds in k8s
        args: [
          "-c", "/etc/filebeat.yml",
          "-e",
        ]
        volumeMounts:
        - name: filebeat-config-volume
          mountPath: /etc/filebeat.yml
          subPath: filebeat.yml
        - name: shared-logs
          mountPath: /app/logs
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - name: reverse-proxy
        image: nginx:1.27-alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: proxy-config-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            cpu: "30m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /nginx-health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /nginx-health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: observation-node-app
  namespace: observability
spec:
  type: LoadBalancer
  selector:
    app: observation-node-app
  ports:
  - name: http
    port: 80
    targetPort: 8080
